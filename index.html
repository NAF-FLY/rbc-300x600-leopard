<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=300, height=600, initial-scale=1.0" />
  <title>HTML5 Banner</title>
  <style>
    html, body {
      margin: 0;
      width: 300px;
      height: 600px;
      overflow: hidden;
      background: #000;
    }

    .banner {
      display: block;
      position: relative;
      width: 300px;
      height: 600px;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    .layer {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .bg {
      left: 0;
      top: 0;
      width: 300px;
      height: 600px;
    }

    .bottom-fade {
      left: 0;
      bottom: 0;
      width: 300px;
      height: 210px;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, .18) 42%, rgba(0, 0, 0, .55) 100%);
    }

    .final-fade {
      inset: 0;
      z-index: 10;
      background: #000;
      opacity: 0;
      animation: finalFade .55s ease-out 8.35s forwards;
    }

    .final-screen {
      inset: 0;
      z-index: 11;
      opacity: 0;
      animation: finalScreenReveal .7s ease-out 8.7s forwards;
    }

    .final-screen-logo {
      left: 50%;
      top: 248px;
      width: 112px;
      height: auto;
      transform: translate3d(-50%, 18px, 0);
      opacity: 0;
      animation: finalScreenLogo .75s cubic-bezier(.22, .72, .2, 1) 8.72s forwards;
    }

    .final-screen-copy {
      left: 50%;
      bottom: 42px;
      width: 252px;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      line-height: 1.1;
      font-weight: 400;
      text-align: center;
      color: #fff;
      opacity: 0;
      animation: finalScreenText .75s ease-out 8.82s forwards;
    }

    .boss {
      left: -419px;
      top: 18px;
      width: 672px;
      height: 850px;
      transform: translate3d(-78px, 250px, 0) scale3d(2, 2, 1);
      transform-origin: center;
      will-change: transform;
      backface-visibility: hidden;
      animation: bossAnim 8.5s cubic-bezier(.1, 1, .3, 1) forwards;
    }

    .leopard {
      left: 63px;
      top: 95px;
      width: 330px;
      height: 540px;
      opacity: 1;
      transform: translate3d(102px, 245px, 0) scale3d(2, 2, 1);
      transform-origin: center;
      will-change: transform;
      backface-visibility: hidden;
      animation: leopardAnim 8.5s cubic-bezier(.1, 1, .3, 1) forwards;
    }

    .offer-card,
    .cta-button,
    .disclaimer {
      position: absolute;
      z-index: 5;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .offer-card {
      left: 50%;
      bottom: 24px;
      width: 288px;
      height: 174px;
      margin-left: -144px;
      padding: 13px;
      border-radius: 12px;
      background: #000;
      transform: translate3d(0, 210px, 0);
      animation:
        cardReveal .85s cubic-bezier(.22, .72, .2, 1) 2s forwards,
        cardLift .7s cubic-bezier(.22, .72, .2, 1) 5s forwards;
    }

    .offer-title {
      margin: 0;
      width: 258px;
      height: 63px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .title-row {
      position: relative;
      left: 0;
      width: 258px;
      overflow: hidden;
    }

    .title-row.row-1 {
      height: 26px;
    }

    .title-row.row-2 {
      height: 34px;
    }

    .title-face {
      position: absolute;
      inset: 0;
      display: block;
    }

    .title-face img {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      width: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .title-row.row-1 .title-face img {
      height: 26px;
    }

    .title-row.row-1 .title-face.next img {
      height: 34px;
    }

    .title-row.row-2 .title-face.current img {
      height: 26px;
    }

    .title-row.row-2 .title-face.next img {
      height: 34px;
    }

    .title-face.current {
      opacity: 0;
      transform: translate3d(0, 100%, 0);
      animation:
        titleCurrentEnter .78s cubic-bezier(.22, .72, .2, 1) forwards,
        titleCurrentFlip .72s cubic-bezier(.22, .72, .2, 1) forwards;
    }

    .title-face.next {
      opacity: 0;
      transform: translate3d(0, 100%, 0);
      animation: titleNextFlip .72s cubic-bezier(.22, .72, .2, 1) forwards;
    }

    .title-row.row-1 .title-face.current {
      animation-delay: 2.72s, 5.04s;
    }

    .title-row.row-2 .title-face.current {
      animation-delay: 2.72s, 5.16s;
    }

    .title-row.row-1 .title-face.next {
      animation-delay: 5.04s;
    }

    .title-row.row-2 .title-face.next {
      animation-delay: 5.16s;
    }

    .offer-bottom {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .t2-logo {
      display: block;
      width: 80px;
      height: 59px;
      flex: 0 0 auto;
      object-fit: contain;
      opacity: 0;
      transform: translate3d(0, 16px, 0);
      animation: logoReveal .55s cubic-bezier(.22, .72, .2, 1) 2.88s forwards;
    }

    .cta-button {
      left: 50%;
      bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 288px;
      height: 81px;
      margin-left: -144px;
      border: 0;
      border-radius: 100px;
      background: #FF3495;
      color: #fff;
      font-size: 20px;
      line-height: 82px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .5px;
      transform: translate3d(0, 110px, 0);
      opacity: 0;
      animation: buttonReveal .7s cubic-bezier(.22, .72, .2, 1) 5s forwards;
    }

    .cta-button img {
      display: block;
      width: 147px;
      height: 17px;
    }

    .disclaimer {
      left: 50%;
      bottom: 7px;
      z-index: 6;
      width: 100%;
      font-weight: 400;
      font-size: 8.5px;
      line-height: 110%;
      color: #ffffff;
      text-align: center;
      transform: translateX(-50%);
    }

    @keyframes leopardAnim {
      from {
        transform: translate3d(102px, 245px, 0) scale3d(2, 2, 1);
      }
      to {
        transform: translate3d(72px, -21px, 0) scale3d(1, 1, 1);
      }
    }

    @keyframes bossAnim {
      from {
        transform: translate3d(-78px, 250px, 0) scale3d(2, 2, 1);
      }
      to {
        transform: translate3d(149px, -36px, 0) scale3d(1, 1, 1);
      }
    }

    @keyframes cardReveal {
      from {
        transform: translate3d(0, 210px, 0);
      }
      to {
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes cardLift {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, -82px, 0);
      }
    }

    @keyframes buttonReveal {
      from {
        transform: translate3d(0, 110px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes logoReveal {
      from {
        transform: translate3d(0, 16px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes titleCurrentEnter {
      0% {
        transform: translate3d(0, 100%, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes titleCurrentFlip {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
      100% {
        transform: translate3d(0, -115%, 0);
        opacity: 0;
      }
    }

    @keyframes titleNextFlip {
      0% {
        transform: translate3d(0, 100%, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes finalFade {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes finalScreenReveal {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes finalScreenLogo {
      from {
        transform: translate3d(-50%, 18px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(-50%, 0, 0);
        opacity: 1;
      }
    }

    @keyframes finalScreenText {
      from {
        transform: translate3d(-50%, 10px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(-50%, 0, 0);
        opacity: 0.7;
      }
    }

  </style>
</head>
<body>
  <a class="banner" id="banner" href="%banner.reference_mrc_user1%" target="%banner.target%" aria-label="banner">
    <img class="layer bg" src="bg.png" alt="" />
    <img class="layer boss" src="boss.png" alt="" />
    <img class="layer leopard" src="leopard.png" alt="" />
    <div class="layer bottom-fade" aria-hidden="true"></div>
    <div class="offer-card">
      <div class="offer-title" aria-label="headline animation">
        <span class="title-row row-1">
          <span class="title-face current">
            <img src="headline-current-top-ru.svg" alt="" aria-hidden="true" />
          </span>
          <span class="title-face next">
            <img src="headline-next-top-ru.svg" alt="" aria-hidden="true" />
          </span>
        </span>
        <span class="title-row row-2">
          <span class="title-face current is-friends-t2">
            <img src="headline-current-bottom-ru.svg" alt="" aria-hidden="true" />
          </span>
          <span class="title-face next">
            <img src="headline-next-bottom-ru.svg" alt="" aria-hidden="true" />
          </span>
        </span>
      </div>
      <div class="offer-bottom">
        <img class="t2-logo" src="logo.png" alt="" aria-hidden="true" />
      </div>
    </div>
    <div class="cta-button">
      <img src="cta-more-ru.svg" alt="Подробнее" />
    </div>
    <div class="disclaimer">Реклама. Рекламодатель: ООО «Т2 Мобайл», ИНН: 7743895280</div>
    <div class="layer final-fade" aria-hidden="true"></div>
    <div class="layer final-screen" aria-hidden="true">
      <img class="layer final-screen-logo" src="logo.png" alt="" />
      <div class="layer final-screen-copy">Реклама. Рекламодатель: ООО «Т2 Мобайл», Россия, 108811, г. Москва, п. Московский, Киевское&nbsp;шоссе, 22-й километр, д. 6, стр. 1, ОГРН: 1137746610088, ИНН: 7743895280, t2.ru | 0+<br />Подробнее о реферальной программе на t2.ru</div>
    </div>
  </a>

  <script>
    (function () {
      var banner = document.getElementById('banner');

      function getClickTag() {
        if (typeof window.clickTag === 'string' && window.clickTag) return window.clickTag;
        var params = new URLSearchParams(window.location.search);
        return params.get('clickTag') || params.get('clickTAG') || '';
      }

      banner.addEventListener('click', function () {
        var url = getClickTag();
        if (url) {
          window.open(url, '_blank');
        }
      });
    })();
  </script>
</body>
</html>
